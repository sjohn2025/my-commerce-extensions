application:
  actions: actions
  web: web-src
  runtimeManifest:
    packages:
      my-commerce-extensions:
        license: Apache-2.0
        actions:
          product-enrichment:
            function: actions/product-enrichment/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              IMS_OAUTH_S2S_CLIENT_ID: $IMS_OAUTH_S2S_CLIENT_ID
              IMS_OAUTH_S2S_CLIENT_SECRET: $IMS_OAUTH_S2S_CLIENT_SECRET
              IMS_OAUTH_S2S_ORG_ID: $IMS_OAUTH_S2S_ORG_ID
              IMS_OAUTH_S2S_SCOPES: $IMS_OAUTH_S2S_SCOPES
              COMMERCE_API_BASE_URL: $COMMERCE_API_BASE_URL
            limits:
              timeout: 60000
              memorySize: 256
            annotations:
              require-adobe-auth: false
              final: true
